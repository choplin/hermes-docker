services:
  hermes:
    build:
      context: .
      args:
        HERMES_UID: ${HERMES_UID}
        HERMES_GID: ${HERMES_GID}
    container_name: hermes
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOME: /home/hermes
      HERMES_HOME: /home/hermes/.hermes
      HERMES_BOOTSTRAP_PROVIDER: ${HERMES_BOOTSTRAP_PROVIDER:-opencode-go}
      HERMES_BOOTSTRAP_MODEL: ${HERMES_BOOTSTRAP_MODEL:-kimi-k2.6}
      HERMES_BOOTSTRAP_ON_START: ${HERMES_BOOTSTRAP_ON_START:-1}
      TERMINAL_CWD: /home/hermes/workspace
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_ENABLED: true
    command: bash -lc "hermes gateway run"
    volumes:
      - hermes_data:/home/hermes/.hermes
      - hermes_workspace:/home/hermes/workspace

  dashboard:
    build:
      context: .
      args:
        HERMES_UID: ${HERMES_UID}
        HERMES_GID: ${HERMES_GID}
    container_name: hermes-dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOME: /home/hermes
      HERMES_HOME: /home/hermes/.hermes
      HERMES_BOOTSTRAP_PROVIDER: ${HERMES_BOOTSTRAP_PROVIDER:-opencode-go}
      HERMES_BOOTSTRAP_MODEL: ${HERMES_BOOTSTRAP_MODEL:-kimi-k2.6}
      HERMES_BOOTSTRAP_ON_START: ${HERMES_BOOTSTRAP_ON_START:-1}
      TERMINAL_CWD: /home/hermes/workspace
      GATEWAY_HEALTH_URL: http://hermes:8642
      HERMES_DASHBOARD_FILES_ROOT: /home/hermes/workspace
    command: bash -lc "hermes dashboard --host 0.0.0.0"
    volumes:
      - hermes_data:/home/hermes/.hermes
      - hermes_workspace:/home/hermes/workspace
    ports:
      - "9119:9119"
    depends_on:
      - hermes

volumes:
  hermes_data:
  hermes_workspace:
